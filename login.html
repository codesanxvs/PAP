<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Flash Cabeleireiro</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <button class="close-btn" onclick="window.location.href='index.html'">×</button>

    <div class="auth-container">
        <div id="loginForm">
            <h1 class="auth-title">Bem-vindo</h1>
            <p class="auth-subtitle">Faça login para continuar</p>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required placeholder="seu@email.pt">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>

                <button type="submit" class="submit-btn">Entrar</button>
            </form>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
