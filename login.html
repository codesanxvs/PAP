<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Flash Cabeleireiro</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <button class="close-btn" onclick="window.location.href='index.html'">×</button>

    <div class="auth-container">
        <div id="loginForm">
            <h1 class="auth-title">Bem-vindo</h1>
            <p class="auth-subtitle">Faça login para continuar</p>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required placeholder="seu@email.pt">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>

                <button type="submit" class="submit-btn">Entrar</button>
            </form>

            <div class="back-link">
                Não tem conta?
                <a href="#" onclick="showRegisterForm(); return false;">Registar-se</a>
            </div>

            <p class="note" style="margin-top: 20px;">
                Admin: <strong>admin@flash.pt</strong><br>
                Password: <strong>adminflash1234*</strong>
            </p>
        </div>

        <div id="registerForm" class="hidden">
            <h1 class="auth-title">Criar Conta</h1>
            <p class="auth-subtitle">
                Já tem conta?
                <a href="#" onclick="showLoginForm(); return false;" class="link-destaque">Login</a>
            </p>

            <button class="email-register-btn" onclick="showEmailRegisterForm()">
                Registar-se com email
            </button>
        </div>

        <div id="emailRegisterForm" class="hidden">
            <h1 class="auth-title">Criar Conta</h1>
            <p class="auth-subtitle">Preencha os seus dados</p>

            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" id="regName" required placeholder="Seu nome">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" required placeholder="seu@email.pt">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" required placeholder="••••••••" minlength="6">
                </div>

                <button type="submit" class="submit-btn">Criar Conta</button>
            </form>

            <div class="back-link">
                <a href="#" onclick="showRegisterForm(); return false;">← Voltar</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
