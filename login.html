<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Flash Cabeleireiro</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <button class="close-btn" onclick="window.location.href='index.html'">×</button>

    <div class="auth-container">
        <!-- Formulário de Login -->
        <div id="loginForm">
            <h1 class="auth-title">Bem-vindo</h1>
            <p class="auth-subtitle">Faça login para continuar</p>

            <div class="social-buttons">
                <button class="social-btn google-btn" onclick="loginWithGoogle()">
                    <svg width="20" height="20" viewBox="0 0 20 20">
                        <path fill="#4285F4" d="M19.6 10.23c0-.82-.1-1.42-.25-2.05H10v3.72h5.5c-.15.96-.74 2.31-2.04 3.22v2.45h3.16c1.89-1.73 2.98-4.3 2.98-7.34z"/>
                        <path fill="#34A853" d="M13.46 15.13c-.83.59-1.96 1-3.46 1-2.64 0-4.88-1.74-5.68-4.15H1.07v2.52C2.72 17.75 6.09 20 10 20c2.7 0 4.96-.89 6.62-2.42l-3.16-2.45z"/>
                        <path fill="#FBBC05" d="M3.99 10c0-.69.12-1.35.32-1.97V5.51H1.07A9.973 9.973 0 000 10c0 1.61.39 3.14 1.07 4.49l3.24-2.52c-.2-.62-.32-1.28-.32-1.97z"/>
                        <path fill="#EA4335" d="M10 3.88c1.88 0 3.13.81 3.85 1.48l2.84-2.76C14.96.99 12.7 0 10 0 6.09 0 2.72 2.25 1.07 5.51l3.24 2.52C5.12 5.62 7.36 3.88 10 3.88z"/>
                    </svg>
                    Continuar com Google
                </button>

                <button class="social-btn facebook-btn" onclick="loginWithFacebook()">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="white">
                        <path d="M20 10c0-5.523-4.477-10-10-10S0 4.477 0 10c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V10h2.54V7.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V10h2.773l-.443 2.89h-2.33v6.988C16.343 19.128 20 14.991 20 10z"/>
                    </svg>
                    Continuar com Facebook
                </button>
            </div>

            <div class="divider">ou</div>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required placeholder="seu@email.pt">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="submit-btn">Entrar</button>
            </form>

            <div class="back-link">
                Não tem conta? <a href="#" onclick="showRegisterForm(); return false;">Registar-se</a>
            </div>
        </div>

        <!-- Formulário de Registo -->
        <div id="registerForm" class="hidden">
            <h1 class="auth-title">REGISTRE-SE</h1>
            <p class="auth-subtitle">Já é membro? <a href="#" onclick="showLoginForm(); return false;" class="link-destaque">Login</a></p>

            <div class="social-buttons">
                <button class="social-btn google-btn" onclick="loginWithGoogle()">
                    <svg width="20" height="20" viewBox="0 0 20 20">
                        <path fill="#4285F4" d="M19.6 10.23c0-.82-.1-1.42-.25-2.05H10v3.72h5.5c-.15.96-.74 2.31-2.04 3.22v2.45h3.16c1.89-1.73 2.98-4.3 2.98-7.34z"/>
                        <path fill="#34A853" d="M13.46 15.13c-.83.59-1.96 1-3.46 1-2.64 0-4.88-1.74-5.68-4.15H1.07v2.52C2.72 17.75 6.09 20 10 20c2.7 0 4.96-.89 6.62-2.42l-3.16-2.45z"/>
                        <path fill="#FBBC05" d="M3.99 10c0-.69.12-1.35.32-1.97V5.51H1.07A9.973 9.973 0 000 10c0 1.61.39 3.14 1.07 4.49l3.24-2.52c-.2-.62-.32-1.28-.32-1.97z"/>
                        <path fill="#EA4335" d="M10 3.88c1.88 0 3.13.81 3.85 1.48l2.84-2.76C14.96.99 12.7 0 10 0 6.09 0 2.72 2.25 1.07 5.51l3.24 2.52C5.12 5.62 7.36 3.88 10 3.88z"/>
                    </svg>
                    Registrar-se com Google
                </button>

                <button class="social-btn facebook-btn" onclick="loginWithFacebook()">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="white">
                        <path d="M20 10c0-5.523-4.477-10-10-10S0 4.477 0 10c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V10h2.54V7.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V10h2.773l-.443 2.89h-2.33v6.988C16.343 19.128 20 14.991 20 10z"/>
                    </svg>
                    Registrar-se com Facebook
                </button>
            </div>

            <div class="divider">ou</div>

            <button class="email-register-btn" onclick="showEmailRegisterForm()">
                Registrar-se com email
            </button>

            <p class="note">
                Seu perfil será automaticamente definido como público ao se registrar.<br>
                Você pode alterar isso depois nas configurações do seu perfil.
            </p>
        </div>

        <!-- Formulário de Registo com Email -->
        <div id="emailRegisterForm" class="hidden">
            <h1 class="auth-title">Criar Conta</h1>
            <p class="auth-subtitle">Preencha seus dados</p>

            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" id="regName" required placeholder="Seu nome">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" required placeholder="seu@email.pt">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" required placeholder="••••••••" minlength="6">
                </div>
                <button type="submit" class="submit-btn">Criar Conta</button>
            </form>

            <div class="back-link">
                <a href="#" onclick="showRegisterForm(); return false;">← Voltar</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
